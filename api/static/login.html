<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Analytiq</title>
<style>
  @font-face{font-family:'InterVar';src:url('/static/fonts/inter-latin-var.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:swap}
  @font-face{font-family:'JBMono';src:url('/static/fonts/jetbrains-mono-latin-var.woff2') format('woff2');
    font-weight:100 800;font-style:normal;font-display:swap}
  :root{
    --slate-900:#0A1419; --paper:#fff; --ink:#0C1A20; --body:#3a525c; --muted:#6a818a;
    --line-d:#1d2f37; --line-l:#e4ecec; --teal:#2ad4c0; --teal-deep:#0c8c7e; --teal-press:#0a7669;
    --on-dark:#e9f1f2; --on-dark-dim:#9bb2ba; --glow:rgba(42,212,192,.16);
    --sans:'InterVar',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JBMono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:var(--sans);
    background:radial-gradient(900px 480px at 50% -10%,rgba(42,212,192,.10),transparent 60%),var(--slate-900);
    color:var(--on-dark);-webkit-font-smoothing:antialiased;padding:24px}
  .card{width:100%;max-width:420px;background:#0F1C24;border:1px solid var(--line-d);
    border-radius:16px;padding:34px 32px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .brand{display:flex;align-items:center;gap:11px;font-weight:740;font-size:19px;letter-spacing:-.02em;
    justify-content:center;margin-bottom:6px}
  .brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--teal),#1f9e92);box-shadow:0 4px 16px var(--glow)}
  .brand svg{width:17px;height:17px}
  .tag{font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--teal);text-align:center;margin-bottom:26px}
  .tabs{display:flex;background:#0A141A;border:1px solid var(--line-d);border-radius:11px;padding:4px;margin-bottom:22px}
  .tabs button{flex:1;padding:9px 0;border:0;border-radius:8px;background:transparent;color:var(--on-dark-dim);
    font:inherit;font-weight:600;font-size:14.5px;cursor:pointer}
  .tabs button.on{background:#16262F;color:var(--on-dark)}
  label{display:block;font-size:13px;font-weight:600;color:var(--on-dark-dim);margin:14px 0 6px}
  input{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--line-d);
    background:#0A141A;color:var(--on-dark);font:inherit;font-size:15px}
  input:focus{outline:none;border-color:var(--teal-deep);box-shadow:0 0 0 3px rgba(42,212,192,.12)}
  .hint{font-size:12.5px;color:var(--on-dark-dim);margin-top:6px}
  .go{width:100%;margin-top:22px;padding:13px 0;border:0;border-radius:11px;cursor:pointer;
    background:var(--teal);color:#04221e;font:inherit;font-weight:700;font-size:15.5px;
    box-shadow:0 6px 22px var(--glow)}
  .go:hover{filter:brightness(1.06)} .go:disabled{opacity:.55;cursor:wait}
  .err{display:none;margin-top:14px;padding:11px 13px;border-radius:10px;font-size:13.5px;
    background:rgba(220,80,80,.10);border:1px solid rgba(220,80,80,.35);color:#f2b8b8}
  .foot{margin-top:20px;text-align:center;font-size:13.5px;color:var(--on-dark-dim)}
  .foot a{color:var(--teal);text-decoration:none}
  #inviteRow{display:none}
  body.register #inviteRow{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#04221e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M10 19V5M16 19v-6M22 19H2"/></svg></span>analyt<b>iq</b></div>
  <div class="tag">Private analytics, run by you</div>

  <div class="tabs">
    <button id="tabIn" class="on" type="button">Sign in</button>
    <button id="tabUp" type="button">Create account</button>
  </div>

  <label for="email">Email</label>
  <input id="email" type="email" autocomplete="username" placeholder="you@company.com">

  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
  <div class="hint" id="pwHint" style="display:none">At least 8 characters.</div>

  <div id="inviteRow">
    <label for="invite">Company invite code <span style="font-weight:400">(optional)</span></label>
    <input id="invite" type="text" autocomplete="off" placeholder="join-xxxxxxxx">
    <div class="hint">Have a code from your company? You'll join its shared workspace — data, connectors and its dedicated model. Leave empty to start a personal Free workspace.</div>
  </div>

  <button class="go" id="go" type="button">Sign in</button>
  <div class="err" id="err"></div>

  <div class="foot">Just looking? <a href="/app">Try the public demo</a> — no account needed.</div>
</div>

<script>
const $=id=>document.getElementById(id);
let mode='in';
function setMode(m){
  mode=m; document.body.classList.toggle('register',m==='up');
  $('tabIn').classList.toggle('on',m==='in'); $('tabUp').classList.toggle('on',m==='up');
  $('go').textContent = m==='in' ? 'Sign in' : 'Create account';
  $('pw').autocomplete = m==='in' ? 'current-password' : 'new-password';
  $('pwHint').style.display = m==='in' ? 'none' : 'block';
  $('err').style.display='none';
}
$('tabIn').onclick=()=>setMode('in'); $('tabUp').onclick=()=>setMode('up');
if(location.hash==='#register') setMode('up');

async function submit(){
  const email=$('email').value.trim(), pw=$('pw').value;
  const body={email, password:pw};
  if(mode==='up' && $('invite').value.trim()) body.invite_code=$('invite').value.trim();
  $('go').disabled=true; $('err').style.display='none';
  try{
    const r=await fetch(mode==='in'?'/auth/login':'/auth/register',
      {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Something went wrong.');
    location.href='/app';
  }catch(e){ $('err').textContent=e.message; $('err').style.display='block'; }
  finally{ $('go').disabled=false; }
}
$('go').onclick=submit;
document.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
</script>
</body>
</html>
